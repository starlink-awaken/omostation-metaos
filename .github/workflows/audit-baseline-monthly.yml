name: metaos-audit-baseline-monthly

# B-2 P0: metaos 跨仓债审计 cron
# 目标: 跑 tools/audit.sh 检查 metaos.audit + D Layer + A2A 迁移状态
# 触发: 每月 1 号 01:30 UTC

on:
  schedule:
    - cron: "30 1 1 * *"
  workflow_dispatch:

jobs:
  audit-baseline:
    name: audit-baseline (B-2 P0 跨仓债)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv + Python
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.13"

      - name: uv sync
        run: uv sync --quiet

      - name: Run metaos audit.sh
        run: |
          bash tools/audit.sh .
        env:
          VENV_PYTHON: .venv/bin/python
