name: AgentKit Smoke

on:
  pull_request:
    paths:
      - "tools/metaos-agentkit/**"
      - ".github/workflows/agentkit-smoke.yml"
  push:
    branches:
      - main
    paths:
      - "tools/metaos-agentkit/**"
      - ".github/workflows/agentkit-smoke.yml"

permissions:
  contents: read

jobs:
  adapter-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/metaos-agentkit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test runner
        run: python -m pip install --disable-pip-version-check pytest
      - name: Run AgentKit tests
        run: python -m pytest -q
      - name: Compile adapter modules
        run: python -m compileall -q src
